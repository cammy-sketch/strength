<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>協力蓄力模板 - 修正版</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* 活動總容器 */
        .charging-zone {
            width: 100%;
            max-width: 800px;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px 10px 50px 10px; /* 增加上下內距 */
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 蓄力系統總容器 (用來定位節點與條) */
        .charge-system {
            position: relative;
            width: 90%; /* 稍微縮小，留出左右空隙給節點標籤 */
            margin: 80px auto 40px auto; /* 增加上方間距給圖示 */
        }

        /* 1. 獎勵節點圖示層 (浮在最上方) */
        .milestone {
            position: absolute;
            top: -65px; /* 調整高度，完全浮在蓄力條上方 */
            transform: translateX(-50%);
            text-align: center;
            width: 90px;
            transition: all 0.3s ease;
            filter: grayscale(1); /* 初始灰色 */
            opacity: 0.6;
            z-index: 10; /* 確保在最上層 */
        }

        /* 達成時的樣式 */
        .milestone.reached {
            filter: grayscale(0);
            opacity: 1;
            transform: translateX(-50%) scale(1.1);
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.8);
        }

        .milestone .icon {
            font-size: 32px; /* 放大圖示 */
            margin-bottom: 8px;
            display: block;
        }

        .milestone .label {
            font-size: 13px;
            background: #334155;
            padding: 4px 10px;
            border-radius: 12px;
            white-space: nowrap; /* 防止文字換行 */
        }

        /* 達成時的標籤樣式 */
        .milestone.reached .label {
            background: #00d2ff;
            color: #0f172a;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        /* 2. 蓄力條主體容器 (在下方) */
        .charge-bar-bg {
            position: relative;
            width: 100%;
            height: 36px;
            background: #1e293b;
            border-radius: 18px;
            border: 2px solid #334155;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
            overflow: hidden; /* 確保進度條圓角切齊 */
            z-index: 5; /* 層次低於圖示 */
        }

        /* 能量流動進度條 */
        .charge-fill {
            width: 0%; /* JS 控制寬度 */
            height: 100%;
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            border-radius: 16px;
            box-shadow: 0 0 15px rgba(58, 123, 213, 0.5);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        /* 能量流動閃光特效 */
        .charge-fill::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: flow 1.5s infinite;
        }

        @keyframes flow {
            from { transform: translateX(-100%); }
            to { transform: translateX(100%); }
        }

        /* 數據顯示與按鈕 */
        .status-text { font-size: 1.1rem; margin-bottom: 20px; color: #cbd5e1; }
        .percent-num { font-size: 1.5rem; font-weight: bold; color: #00d2ff; }

        .btn-charge {
            background: #e63946; /* 換個熱血的紅色 */
            color: white;
            border: none;
            padding: 16px 60px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(230, 57, 70, 0.3);
            transition: all 0.2s;
        }

        .btn-charge:hover { background: #ff4d5a; }
        .btn-charge:active { transform: scale(0.95); box-shadow: 0 2px 5px rgba(230, 57, 70, 0.2); }
    </style>
</head>
<body>

    <div class="charging-zone">
        <h2>⚡ 全站協力：萬眾蓄力大作戰 ⚡</h2>
        <p>全體玩家一起集氣，達到指定進度解鎖全服獎勵！</p>

        <div class="charge-system">
            
            <div id="ms30" class="milestone" style="left: 30%;">
                <span class="icon">🎁</span>
                <span class="label">30% 達成獎</span>
            </div>
            
            <div id="ms70" class="milestone" style="left: 70%;">
                <span class="icon">💎</span>
                <span class="label">70% 進階獎</span>
            </div>
            
            <div id="ms100" class="milestone" style="left: 100%;">
                <span class="icon">🏆</span>
                <span class="label">100% 滿載獎</span>
            </div>

            <div class="charge-bar-bg">
                <div id="chargeFill" class="charge-fill"></div>
            </div>
        </div>

        <p class="status-text">全站當前蓄力值：<span id="percentDisplay" class="percent-num">0</span>%</p>
        <button class="btn-charge" onclick="addPower()">點擊注入能量</button>
    </div>

    <script>
        let currentPower = 0;

        function addPower() {
            if (currentPower < 100) {
                // 每次點擊模擬增加 5% 進度
                currentPower += 5;
                if (currentPower > 100) currentPower = 100;
                updateUI();
            }
        }

        function updateUI() {
            // 1. 更新蓄力條寬度
            document.getElementById('chargeFill').style.width = currentPower + '%';
            
            // 2. 更新數字顯示
            document.getElementById('percentDisplay').innerText = currentPower;

            // 3. 檢查里程碑是否達成 (點亮圖示)
            if (currentPower >= 30) document.getElementById('ms30').classList.add('reached');
            if (currentPower >= 70) document.getElementById('ms70').classList.add('reached');
            if (currentPower >= 100) {
                document.getElementById('ms100').classList.add('reached');
            }
        }
    </script>
</body>
</html>
